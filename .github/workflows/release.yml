name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Build plugin bundle
        run: |
          cd webapp && npm ci && cd ..
          make dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum com.lalbers.community-admin-*.tar.gz > SHA256SUMS

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/com.lalbers.community-admin-*.tar.gz
            dist/SHA256SUMS
